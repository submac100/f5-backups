---
# f5networks.f5_modules talk to the device over the iControl REST API from the
# EE itself, so the Ansible connection is local and we pass a provider dict.
ansible_connection: local

# f5_username / f5_password are injected by an AWX credential (see README).
f5_provider:
  server: "{{ ansible_host }}"
  server_port: 443
  user: "{{ f5_username }}"
  password: "{{ f5_password }}"
  validate_certs: false          # lab only — set true + supply a CA bundle in prod
